<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Matters Songs | Contact</title>
  <meta name="description" content="Contact Music Matters Songs" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2EFE9;
      --text: #191614;
      --muted: #5f544e;
      --soft: #877972;
      --accent: #c3ada2;
      --line: #ece6e1;
      --max: 1200px;
      --content: 720px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: "Manrope", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }

    .container {
      width: min(100% - 2.5rem, var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(242, 239, 233, 0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(236, 230, 225, 0.8);
    }

    .header-inner {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo-link img {
      width: clamp(76px, 8vw, 98px);
      height: auto;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: clamp(1rem, 2vw, 1.7rem);
    }

    .site-nav a {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid transparent;
      padding-bottom: 0.18rem;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .site-nav a:hover,
    .site-nav a:focus-visible,
    .site-nav a.active {
      color: var(--accent);
      border-color: var(--accent);
      outline: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .page-shell {
      width: min(100% - 2.5rem, var(--content));
      margin: 0 auto;
      padding: clamp(1.15rem, 2.2vw, 1.5rem) 0 clamp(2.5rem, 6vw, 4.75rem);
      text-align: center;
    }

    .page-label {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: clamp(1.15rem, 2.2vw, 1.4rem);
    }

    .contact-panel {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: clamp(2rem, 5vw, 3rem) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.3rem;
    }

    .contact-email {
      color: var(--muted);
      font-size: 1rem;
      transition: color 0.2s ease;
    }

    .contact-email:hover {
      color: var(--text);
    }

    .social-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    .social-links a {
      color: var(--soft);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s ease;
    }

    .social-links a:hover {
      color: var(--accent);
    }

    .site-footer {
      padding: 1.05rem 0 1.25rem;
      border-top: 1px solid var(--line);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7e736c;
    }

    @media (max-width: 640px) {
      .container,
      .page-shell {
        width: min(100% - 1.5rem, var(--max));
      }

      .header-inner {
        min-height: 70px;
      }

      .site-nav a {
        font-size: 0.66rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo-link" href="index.html" aria-label="Music Matters Songs Home">
        <img src="images/MMS-Logo.png" alt="Music Matters Songs" />
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">About</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-shell">
      <p class="page-label">Contact</p>
      <div class="contact-panel">
        <a class="contact-email" href="mailto:info@musicmatterssongs.com">info@musicmatterssongs.com</a>
        <div class="social-links">
          <a href="https://www.instagram.com/musicmatterssongs" target="_blank" rel="noopener noreferrer">Instagram</a>
          <a href="https://www.facebook.com/musicmatterssongs" target="_blank" rel="noopener noreferrer">Facebook</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">&copy; 2026 Music Matters Songs</div>
  </footer>
</body>
</html>
