<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Matters Songs | Contact</title>
  <meta name="description" content="Contact Music Matters Songs" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2EFE9;
      --text: #191614;
      --muted: #5f544e;
      --soft: #877972;
      --accent: #c3ada2;
      --line: #ece6e1;
      --max: 1200px;
      --content: 720px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: "Manrope", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }

    .container {
      width: min(100% - 2.5rem, var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(242, 239, 233, 0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(236, 230, 225, 0.8);
    }

    .header-inner {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo-link img {
      width: clamp(76px, 8vw, 98px);
      height: auto;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: clamp(1rem, 2vw, 1.7rem);
    }

    .site-nav a {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid transparent;
      padding-bottom: 0.18rem;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .site-nav a:hover,
    .site-nav a:focus-visible,
    .site-nav a.active {
      color: var(--accent);
      border-color: var(--accent);
      outline: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .page-shell {
      width: min(100% - 2.5rem, var(--content));
      margin: 0 auto;
      padding: clamp(4rem, 10vh, 7rem) 0 clamp(3rem, 7vh, 5rem);
      text-align: center;
    }

    .page-label {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: clamp(1.5rem, 3vh, 2rem);
    }

    .contact-panel {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: clamp(3rem, 6vh, 4rem) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.9rem;
    }

    .contact-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .contact-subhead {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .contact-icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--soft);
      transition: color 0.2s ease;
    }

    .contact-icon-link:hover {
      color: var(--accent);
    }

    .contact-icon-link svg {
      width: 44px;
      height: 44px;
      stroke: currentColor;
      stroke-width: 1.6;
      fill: none;
      display: block;
    }

    .contact-icon-link svg.fill-icon {
      fill: currentColor;
      stroke: none;
    }

    .site-footer {
      padding: 1.05rem 0 1.25rem;
      border-top: 1px solid var(--line);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7e736c;
    }

    @media (max-width: 640px) {
      .container,
      .page-shell {
        width: min(100% - 1.5rem, var(--max));
      }

      .header-inner {
        min-height: 70px;
      }

      .site-nav a {
        font-size: 0.66rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo-link" href="index.html" aria-label="Music Matters Songs Home">
        <img src="images/MMS-logo.png" alt="Music Matters Songs" />
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">About</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-shell">
      <p class="page-label">Contact</p>
      <div class="contact-panel">
        <div class="contact-group">
          <div class="contact-subhead">Music Matters Songs</div>
          <a class="contact-icon-link" href="mailto:info@musicmatterssongs.com" aria-label="Email Music Matters Songs">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.75h18v10.5H3z"/><path d="M3 7l9 7 9-7"/></svg>
          </a>
        </div>
        <div class="contact-group">
          <div class="contact-subhead">Instagram</div>
          <a class="contact-icon-link" href="https://www.instagram.com/musicmatterssongs" target="_blank" rel="noopener noreferrer" aria-label="Music Matters Songs Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"/><circle cx="12" cy="12" r="4.25"/><circle cx="17.2" cy="6.8" r="1.1" class="fill-icon"/></svg>
          </a>
        </div>
        <div class="contact-group">
          <div class="contact-subhead">Facebook</div>
          <a class="contact-icon-link" href="https://www.facebook.com/musicmatterssongs" target="_blank" rel="noopener noreferrer" aria-label="Music Matters Songs Facebook">
            <svg class="fill-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 22v-8h2.8l.42-3.26H13.5V8.66c0-.94.27-1.58 1.62-1.58H17V4.16c-.33-.04-1.47-.16-2.8-.16-2.76 0-4.65 1.68-4.65 4.77v1.97H6.5V14h3.05v8h3.95Z"/></svg>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">&copy; 2026 Music Matters Songs</div>
  </footer>
</body>
</html>
